<!DOCTYPE html>
<html>
<head>
    <title>ArtHub</title>
    <style type="text/css">
        /* Reset default browser margins and padding */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%; /* Ensure html and body take full height */
            overflow: hidden; /* Hide scrollbars on the main page */
        }

        /* Style the iframe to cover the entire viewport */
        iframe {
            position: absolute; /* Position relative to the viewport/parent */
            top: 0;
            left: 0;
            width: 100%; /* Full width */
            height: 100%; /* Full height */
            border: none; /* Remove default iframe border */
            display: block; /* Iframes are inline by default */
        }
    </style>
</head>
<body>
    <!-- Replace "https://example.com" with the URL you want to embed -->
    <iframe src="https://arthub.is-great.org" title="Full page embedded content">
        Your browser does not support iframes.
    </iframe>
</body>
</html>
